type: vertical-stack
cards:
  - type: markdown
    content: >
      ## ☑️ Today's Chores <ha-icon icon="mdi:calendar-today"></ha-icon> **{{
      now().strftime('%A, %B %-d') }}**
    style: |
      ha-card {
        background: var(--primary-color);
        color: var(--text-primary-color);
        padding: 12px 16px 8px;
        margin-bottom: -8px;
        border-radius: 12px 12px 0 0;
      }
      h2 { margin: 0 0 4px; font-size: 1.2em; }
  - type: custom:auto-entities
    card_param: cards
    card:
      type: grid
      columns: 3
      square: true
    filter:
      include:
        - entity_id: sensor.*_choreops_chore_status_*
          state: due
          options:
            type: custom:button-card
            template: choreops_chore_tile
    sort:
      method: attribute
      attribute: assignee
      ignore_case: true
    empty_message: 🎉 All caught up! No chores due today.
